{% extends "admins/base1.html" %}

{% block title %}In Process (Total){% endblock %}

{% block contents %}

<div class="card">
    <div class="card-header">
        <h3 class="headline">Translations in Process</h3>
    </div>
    <div class="card-body">
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h2 class="h6 text-uppercase text-muted">Total Users</h2>
                        <p class="display-6 mb-0" id="totalUsers">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h2 class="h6 text-uppercase text-muted">Total Articles</h2>
                        <p class="display-6 mb-0" id="totalArticles">0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive shadow-sm">
            <table class="table table-striped compact table-sm table-hover align-middle mb-0" id="inProcessTotalTable">
                <thead>
                    <tr>
                        <th scope="col" style="width: 10%">#</th>
                        <th scope="col">User</th>
                        <th scope="col" class="text-center" style="width: 20%">Articles</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function () {
        let table = $('#inProcessTotalTable').DataTable({
            ajax: {
                url: '/api/in_process_total',
                dataSrc: function (json) {
                    // Update summary counts
                    $('#totalUsers').text(json.count);
                    const totalArticles = json.results.reduce((sum, row) => sum + row.article_count, 0);
                    $('#totalArticles').text(totalArticles);
                    return json.results;
                }
            },
            columns: [
                {
                    data: null,
                    render: function (data, type, row, meta) {
                        return meta.row + 1;
                    }
                },
                {
                    data: 'user'
                },
                {
                    data: 'article_count',
                    className: 'text-center',
                    render: function (data, type, row) {
                        return `<span class="badge bg-primary">${data}</span>`;
                    }
                }
            ],
            order: [[2, 'desc']], // Sort by article count descending
            pageLength: 25,
            lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]]
        });
    });
</script>

{% endblock %}
