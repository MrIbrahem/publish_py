{%- macro msg_template(username, msg) -%}
<div dir='ltr' style='
        background-color: #f8f9fa !important;
        position: relative;
        display: -ms-flexbox;
        display: flex;
        -ms-flex-wrap: wrap;
        flex-wrap: wrap;
        -ms-flex-align: center;
        align-items: center;
        -ms-flex-pack: justify;
        justify-content: space-between;
        padding: 0.5rem 1rem;'>
  <table>
    <tbody>
      <tr>
        <td>
          <img style='width: 40px;
            hight: auto;
            display: inline-block;
            margin-right: 1rem;
            vertical-align: middle;
            border-style: none;'
            src='https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Wiki_Project_Med_Foundation_logo.svg/250px-Wiki_Project_Med_Foundation_logo.svg.png'
            alt='Wiki Project Med Foundation logo'>
        </td>
        <td>
          <a style='display: inline-block;
            padding-top: 0.3125rem;
            padding-bottom: 0.3125rem;
            margin-right: 1rem;
            font-size: 1.2rem;
            line-height: inherit;
            color: #007bff;
            text-decoration: none;
            background-color: transparent;
            /* white-space: nowrap;*/
            ' href='https://mdwiki.toolforge.org/Translation_Dashboard'>Wiki Project Med Translation Dashboard</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>
<br>
<div style=' padding-right: 5px; padding-left: 5px; max-width: 95%;'>
  <div style='
            position: relative;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-direction: column;
            flex-direction: column;
            min-width: 0;
            word-wrap: break-word;
            background-color: #fff;
            background-clip: border-box;
            border: 1px solid rgba(0, 0, 0, .125);
            border-radius: 0.25rem;'>
    <table>
      <tbody>
        <tr>
          <td>
            <div
              style='padding: 0.75rem 1.25rem 0.1rem;margin-bottom: 0;background-color: rgba(0,0,0,.03);border-bottom: 1px solid rgba(0,0,0,.125);'>
              <h3>Dear {{ username }}:</h3>
            </div>
          </td>
        </tr>
        <tr>
          <td>
            <div style='-ms-flex: 1 1 auto;flex: 1 1 auto;min-height: 1px;padding: 1rem;'>
              {{ msg | safe }}
            </div>
          </td>
        </tr>
        <tr>
          <td>
            <div
              style='padding: 0.75rem 1.25rem;background-color: rgba(0,0,0,.03);border-top: 1px solid rgba(0,0,0,.125);'>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
{%- endmacro -%}
