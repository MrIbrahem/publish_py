{% extends "admins/base1.html" %}

{% block title %}In Process{% endblock %}

{% block contents %}

<div class="card">
    <div class="card-header">
        <h3 class="headline">Translations in Process</h3>
    </div>
    <div class="card-body">
        <!-- <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h2 class="h6 text-uppercase text-muted">Total Records</h2>
                        <p class="display-6 mb-0" id="totalRecords">0</p>
                    </div>
                </div>
            </div>
        </div> -->

        <div class="table-responsive shadow-sm">
            <table class="table table-striped compact table-sm table-smtable-hover align-middle mb-0" id="inProcessTable">
                <thead>
                    <tr>
                        <th scope="col" style="width: 5%">#</th>
                        <th scope="col">User</th>
                        <th scope="col" style="width: 15%">Lang.</th>
                        <th scope="col">Title</th>
                        <th scope="col" style="width: 10%">Campaign</th>
                        <th scope="col" style="width: 12%">Draft</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function () {
        let table = $('#inProcessTable').DataTable({
            ajax: {
                url: '/api/in_process',
                dataSrc: function (json) {
                    // Update total records count
                    $('#totalRecords').text(json.count);
                    return json.results;
                }
            },
            columns: [
                {
                    data: null,
                    render: function (data, type, row, meta) {
                        return meta.row + 1;
                    }
                },
                {
                    data: 'user',
                    render: function (data, type, row) {
                        return `<a href="https://mdwiki.org/wiki/User:${data}" target="_blank">${data}</a> (<a href="https://mdwiki.org/wiki/User_talk:${data}" target="_blank">talk</a>)`;
                    }
                },
                {
                    data: null,
                    render: function (data, type, row) {
                        return `(${row.lang}) ${row.autonym}`;
                    }
                },
                {
                    data: 'title'
                },
                {
                    data: 'campaign'
                },
                {
                    data: 'add_date',
                    render: function (data, type) {
                        if (type === 'display' && data) {
                            return data.split('T')[0];
                        }
                        return data;
                    }
                }
            ],
            order: [[0, 'asc']],
            pageLength: 25,
            lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]]
        });
    });
</script>

{% endblock %}
