{% extends "admins/base1.html" %}

{% block title %}In Process{% endblock %}

{% block contents %}

<div class="card">
    <div class="card-header">
        <h4>Translations in Process:</h4>
    </div>
    <div class="card-body">
        <table id="process_table" class="table table-sm table-striped table_text_left" style="font-size:90%;">
            <thead>
                <tr>
                    <th scope="col" style="width: 5%">#</th>
                    <th scope="col">User</th>
                    <th scope="col" style="width: 15%">Lang.</th>
                    <th scope="col">Title</th>
                    <th scope="col" style="width: 10%">Campaign</th>
                    <th scope="col" style="width: 12%">Draft</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function () {
        let table = $("#process_table").DataTable({
            // stateSave: false,
            // paging: false,
            // info: false,
            // searching: false,
            responsive: {
                details: true
                // display: $.fn.dataTable.Responsive.display.modal()
            },
            ajax: {
                url: "/api/in_process",
                dataSrc: function (json) {
                    // Update total records count
                    $("#totalRecords").text(json.count);
                    return json.results;
                }
            },
            lengthMenu: [
                [25, 50, 100, 200],
                [25, 50, 100, 200]
            ],
            order: [[0, "asc"]],
            pageLength: 25,
            columns: [
                {
                    data: null,
                    render: function (data, type, row, meta) {
                        return meta.row + 1;
                    }
                },
                {
                    data: "user",
                    render: function (data, type, row) {
                        const escapedUser = $("<div>").text(data || "").html();
                        const encodedUser = encodeURIComponent(data || "");

                        const base_url = "{{ url_for('td.leaderboard.users', username='USERNAME_PLACEHOLDER') }}";
                        const leadboard_url = base_url.replace('USERNAME_PLACEHOLDER', data);

                        let talkUrl = `//${row.lang}.wikipedia.org/w/index.php?title=User_talk:${encodedUser}&action=edit&section=new`;
                        return `<a href="${leadboard_url}" target="_blank" rel="noopener noreferrer">${escapedUser}</a> (<a href="${talkUrl}" target="_blank" rel="noopener noreferrer">talk</a>)`;
                    }
                },
                {
                    data: "lang",
                    render: function (data, type, row) {
                        const lang = $("<div>").text(row.lang || "").html();
                        const autonym = $("<div>").text(row.autonym || "").html();
                        const base_url = "{{ url_for('td.leaderboard.langs', lang_code='_PLACEHOLDER_') }}";

                        const leadboard_url = base_url.replace('_PLACEHOLDER_', data);

                        return `
                            <a href="${leadboard_url}" target="_blank" rel="noopener noreferrer">
                            (${lang}) ${autonym}
                            </a>`;
                    }
                },
                {
                    data: "title",
                    render: function (data, type, row) {
                        let encoded = encodeURIComponent(data);
                        return `<a href="https://mdwiki.org/wiki/${encoded}" target="_blank">${data}</a>`;
                    }
                },
                {
                    data: "campaign"
                },
                {
                    data: "add_date",
                    render: function (data, type, row) {
                        // Extract YYYY-MM-DD from the timestamp
                        let dateOnly = data.includes("T") ? data.split("T")[0] : data;
                        let encodedTitle = encodeURIComponent(row.title);
                        return `<a href="https://mdwikicx.toolforge.org/wiki/${row.lang}/${encodedTitle}" target="_blank">${dateOnly}</a>`;
                    }
                }
            ]
        });
    });
</script>

{% endblock %}
