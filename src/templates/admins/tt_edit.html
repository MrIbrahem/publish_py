{% extends "admins/base1_no_navbar.html" %}

{% block title %}{% if id %}Edit Translate type{% else %}Add Translate type{% endif %}{% endblock %}

{% block contents %}
<div class="card">
    <div class="card-header">
        <h4>{% if id %}Edit Translate type{% else %}Add Translate type{% endif %}</h4>
    </div>
    <div class="card-body">
        <form action="{{ url_for('admin.tt.tt_post') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div class="row g-3 align-items-end">
                {% if id %}
                <div class="col-md-3">
                    <div class="input-group">
                        <span class="input-group-text">Id</span>
                        <input class="form-control" type="text" name="id" value="{{ id }}" readonly />
                    </div>
                </div>
                {% endif %}
                <div class="col-md-3">
                    <div class="input-group">
                        <span class="input-group-text">Title</span>
                        <input class="form-control" type="text" name="title" value="{{ title|e }}" required />
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="d-flex gap-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="lead" name="lead" value="1"
                                {% if lead == '1' or lead == 1 %}checked{% endif %}>
                            <label class="form-check-label" for="lead">Lead</label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="full" name="full" value="1"
                                {% if full == '1' or full == 1 %}checked{% endif %}>
                            <label class="form-check-label" for="full">Full</label>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-outline-primary">Save</button>
                    <a class="btn btn-outline-secondary" href="{{ url_for('admin.tt.tt_index') }}">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
