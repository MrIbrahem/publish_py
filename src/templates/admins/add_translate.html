{% extends "admins/base1.html" %}

{% block title %}Add translations{% endblock %}

{% block contents %}
<div class="card">
    <select class="catsoptions" data-bs-theme="auto" hidden>
        {% for cat in categories %}
        <option value="{{ cat.category }}">{{ cat.campaign }}</option>
        {% endfor %}
    </select>
    <div class="card-header">
        <h4>Add translations:</h4>
    </div>
    <div class="cardbody p-2">
        <form action="{{ url_for('admin.add.add_translate') }}" method="POST">
            <input name="csrf_token" value="{{ csrf_token() }}" type="hidden" />
            <div class="form-group">
                <table class="table table-striped compact table-mobile-responsive table-mobile-sided" style="font-size:95%;">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Mdwiki Title</th>
                            <th>Campaign</th>
                            <th>Type</th>
                            <th>User</th>
                            <th>Lang.</th>
                            <th>Target</th>
                            <th>Published</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tab_data">
                        <tr id="row_1">
                            <td data-order="1" data-content="#">1</td>
                            <td data-content="Mdwiki Title">
                                <input class="form-control mdtitles" size="15" name="rows[1][mdtitle]" required />
                            </td>
                            <td data-content="Campaign">
                                <select class="form-select catsoptions" name="rows[1][cat]" data-bs-theme="auto">
                                    {% for cat in categories %}
                                    <option value="{{ cat.category }}">{{ cat.campaign }}</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td data-content="Type">
                                <select name="rows[1][type]" class="form-select w-100" data-bs-theme="auto">
                                    <option value="lead">Lead</option>
                                    <option value="all">All</option>
                                </select>
                            </td>
                            <td data-content="User">
                                <input class="form-control td_user_input" size="10" name="rows[1][user]" required />
                            </td>
                            <td data-content="Lang.">
                                <input class="form-control lang_input" size="2" name="rows[1][lang]" required />
                            </td>
                            <td data-content="Target">
                                <input class="form-control" size="20" name="rows[1][target]" />
                            </td>
                            <td data-content="Published">
                                <input class="form-control" size="10" name="rows[1][pupdate]" placeholder="YYYY-MM-DD" />
                            </td>
                            <td data-content="Delete">
                                <div class="">
                                    <button type="button" class="btn btn-danger btn-sm" onclick="delete_row(1)">Delete</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="form-group d-flex justify-content-between">
                <button type="submit" class="btn btn-outline-primary mb-10">Save</button>
                <span role="button" id="add_new_row" class="btn btn-outline-primary" onclick="add_new_row()">New row</span>
            </div>
        </form>
    </div>
</div>

<div class="cardbody p-3">
    <div class="container">
        <div id="alert" class="alert alert-warning" role="alert" style="display:none;">
            <i class="bi bi-exclamation-triangle"></i> <span id="alert_text"></span>
        </div>
    </div>
    <div class="input-group">
        <span class="input-group-text">URL</span>
        <input class="form-control mdtitles url" size="15" id="url" name="url" value="" />
        <button class="btn btn-outline-primary mb-10" onclick="start_one_url(this)">Search</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/add_by_url.js') }}"></script>
{% endblock %}
