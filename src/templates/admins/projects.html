{% extends "admins/base1.html" %}

{% block title %}Projects{% endblock %}

{% block contents %}

<div class="card">
    <div class="card-header">
        <h3 class="headline">Projects</h3>
    </div>
    <div class="card-body">
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <form method="post" action="{{ url_for('admin.add_project_record') }}" class="row g-2 align-items-end">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="col-sm-8 col-md-6 col-lg-4">
                        <label class="form-label" for="new-g_title">Add Project</label>
                        <input type="text" name="g_title" class="form-control" id="new-g_title" placeholder="Title"
                            required>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-outline-primary">
                            <i class="bi bi-person-plus-fill"></i> Add
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header text-bg-light">
                <h5 class="mb-0 mt-1">Manage projects</h5>
            </div>
            <div class="card-body">
                <form method="post" action="{{ url_for('admin.projects_update') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-4">
                            <thead>
                                <tr>
                                    <th scope="col">#</th>
                                    <th scope="col">Title</th>
                                    <th scope="col">Delete</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for s in projects %}
                                <tr>
                                    <td>{{ loop.index }}</td>
                                    <td>
                                        <input type="hidden" name="projects[][g_id]" value="{{ s.g_id }}" />
                                        <input type="text" class="form-control" name="projects[][g_title]"
                                            value="{{ s.g_title }}">
                                    </td>
                                    <td>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" role="switch"
                                                name="projects[][delete]" id="delete_{{ s.g_id }}" value="{{ s.g_id }}"
                                                title="Mark for deletion">
                                            <label class="form-check-label visually-hidden"
                                                for="delete_{{ s.g_id }}">Delete {{ s.title }}</label>
                                        </div>
                                    </td>
                                </tr>
                                {% else %}
                                <tr>
                                    <td colspan="4" class="text-center text-muted py-4">No projects configured yet.</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>

                    {% if projects %}
                    <div class="text-end">
                        <button type="submit" class="btn btn-outline-success px-4">
                            <i class="bi bi-save"></i> Save
                        </button>
                    </div>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
