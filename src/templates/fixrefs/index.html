{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="card mb-3">
        <div class="card-header aligncenter" style="font-weight:bold;">
            <h3>Fix references in Wikipedia's: <a href='https://hashtags.wmcloud.org/?query=mdwiki'
                    target='_blank'>#mdwiki</a></h3>
        </div>
        <div class="card-body pb-0">
            <form method="POST" action="/fixrefs/">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <div class='container'>
                    <div class='row'>
                        <div class='col-md-4'>
                            <div class='input-group mb-3'>
                                <div class='input-group-prepend'>
                                    <span class='input-group-text'>Langcode</span>
                                </div>
                                <input class='form-control' type='text' id='lang' name='lang' value='{{ lang or '' }}'
                                    placeholder="e.g., en, ar" required />
                            </div>
                            <div class='input-group mb-3'>
                                <div class='input-group-prepend'>
                                    <span class='input-group-text'>Wikipedia title</span>
                                </div>
                                <input class='form-control' type='text' id='title' name='title'
                                    value='{{ title or '' }}' required />
                            </div>
                        </div>
                        <div class='col-md-4'>
                            <div class='input-group mb-3'>
                                <div class='input-group-prepend'>
                                    <span class='input-group-text'>MDWiki Source Title</span>
                                </div>
                                <input class='form-control' type='text' id='source_title' name='source_title'
                                    value='{{ source_title or '' }}' />
                            </div>
                            <div class='input-group mb-3'>
                                <div class='input-group-prepend'>
                                    <span class='input-group-text'> MDWiki Revision ID</span>
                                </div>
                                <input class='form-control' type='text' id='mdwiki_revid' name='mdwiki_revid'
                                    value='{{ mdwiki_revid or '' }}' />
                            </div>
                        </div>
                        <div class='col-md-3'>
                            <div class='form-check form-switch'>
                                <input class='form-check-input' type='checkbox' id='save' name='save' value='1'
                                    {{ 'checked' if form.save else '' }}>
                                <label class='check-label' for='save'>Auto save</label>
                            </div>

                            <div class='form-check form-switch'>
                                <input class='form-check-input' type='checkbox' id='movedots' name='movedots' value='1'
                                    {{ 'checked' if form.movedots else '' }}>
                                <label class='form-check-label' for='movedots'>Move dots after references</label>
                            </div>

                            <div class='form-check form-switch'>
                                <input class='form-check-input' type='checkbox' id='infobox' name='infobox' value='1'
                                    {{ 'checked' if form.infobox else '' }}>
                                <label class='form-check-label' for='infobox'>Expand Infobox</label>
                            </div>
                        </div>
                        <div class='col-md-1'>
                            <h4 class='aligncenter'>
                                <input class='btn btn-outline-primary' type='submit' value='start'>
                            </h4>
                        </div>
                    </div>
                    {% if not result %}
                    <div class="mb-3">
                        <label for="text" class="form-label">Text Content</label>
                        <textarea class="form-control" id="text" name="text" rows="5">{{ text or '' }}</textarea>
                    </div>
                    {% endif %}
                </div>
            </form>

        </div>
    </div>

    {% if result %}

    <div class="card">
        <div class="card-header aligncenter" style="font-weight:bold;">
            <h3>
                <a target='_blank' href="https://{{ lang }}.wikipedia.org/w/index.php?title={{ title }}">{{ title }}</a>
                result:
            </h3>
        </div>
        <div class="card-body pb-0 m-1">
            <form id='editform' name='editform' method='POST'
                action='https://{{ lang }}.wikipedia.org/w/index.php?title={{ title }}&action=submit' target='_blank'>
                <input type='hidden' value='' name='wpEdittime' />
                <input type='hidden' value='' name='wpStarttime' />
                <input type='hidden' value='' name='wpScrolltop' id='wpScrolltop' />
                <input type='hidden' value='12' name='parentRevId' />
                <input type='hidden' value='wikitext' name='model' />
                <input type='hidden' value='text/x-wiki' name='format' />
                <input type='hidden' value='1' name='wpUltimateParam' />
                <input type='hidden' name='wpSummary' value='Fix references, Expand infobox #mdwiki .toolforge.org.'>
                <input type='hidden' id='wikitext-old' value=''>
                <div class="mb-3">
                    <label for="wikitext-new" class="form-label fw-semibold">
                    </label>
                    <textarea id="wikitext-new" class="form-control" name="wpTextbox1"
                        rows="5">{{ result or '' }}</textarea>
                </div>
                <div class='editOptions aligncenter'>
                    <input id='wpPreview' type='submit' class='btn btn-outline-primary' tabindex='5' title='[p]'
                        accesskey='p' name='wpPreview' value='Preview changes' />
                    <input id='wpDiff' type='submit' class='btn btn-outline-primary' tabindex='7' name='wpDiff'
                        value='show changes' accesskey='v' title='show changes.'>
                    <div class='editButtons'>
                    </div>
                </div>
            </form>
        </div>
    </div>
    {% endif %}

</div>
{% endblock %}
